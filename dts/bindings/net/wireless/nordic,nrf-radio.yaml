description: |
    Nordic DFE antennas matrix description

    dfegpio[n]-gpios properties provide GPIO pins to Radio peripheral. Provided
    GPIO pins are used to switch antennas e.g. to use 12 antennas 4 GPIO pins
    must be provided, 4 GPIO pins support up to 16 antennas.

    All dfegpio[n]-gpios properties have required property set to false.
    It depends on end user which Radio PSEL_GPIO[n] registers will be used
    to drive antenna switches.
    Nevertheless there is a requirement that at least two antennas are
    available. That means at least one dfegpio[n]-gpios must be provided,
    to give Radio possibility to switch between these two antennas.

compatible: "nordic,nrf-radio"

include: [base.yaml]

properties:
    ant-num:
      type: int
      required: true
      description: |
        Number of available antennas.

        Value zero means no antenna available. If provided value different than
        zero, it must be greater or equal to two.

    dfegpio0-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 0

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.
    dfegpio1-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 1

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio2-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 2

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio3-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 3

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio4-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 4

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio5-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 5

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio6-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 6


        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.

    dfegpio7-gpios:
      type: phandle-array
      required: false
      description: |
        Pin select for DFE pin 7

        Flags cell in the property is not used for GPIO pin initialization
        and should be set to zero.
